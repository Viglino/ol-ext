  <title>ol-ext: Image line control</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

  <meta name="description" content="A control to show image on a map." />
  <meta name="keywords" content="ol, image, control, line" />

  <!-- jQuery -->
  <script type="text/javascript" src="https://code.jquery.com/jquery-1.11.0.min.js"></script>

  <!-- geotiff -->
  <script src="https://cdn.jsdelivr.net/npm/geotiff"></script>

  <!-- Openlayers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@latest/ol.css" />
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/ol@latest/dist/ol.js"></script>

  <!-- ol-ext -->
  <link rel="stylesheet" href="../../dist/ol-ext.css" />
  <script type="text/javascript" src="../../dist/ol-ext.js"></script>

  <style>
    input[type="text"] {
      display: inline-block;
      width: calc(100% - 6em);
    }
    body[data-loading] {
      opacity: 0.5;
    }
    img {
      margin: 3px;
    }
    label {
      margin-top: 5px;
      display: block;
    }
    .result {
      position: relative;
      display: inline-block;
    }
    .result span {
      position: absolute;
      top: 0;
      right: 0;
      background-color: #fff;
      color: #000;
      padding: 0 .5em;
      box-shadow: 1px 1px 5px 0px #000;
    }
  </style>

</head>
<body>
  <h1>GeoTIFF</h1>

  <label>
    Image 1:
    <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/P18000152/IGNF_PVA_1-0__2018-06-22__CP18000152_18FD3725x00030_00124.tif"/>
  </label>
  <label>
    Image 2:
    <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/P17000212/IGNF_PVA_1-0__2017-06-17__CP17000212_17FD5820x00012_01054.tif"/>
  </label>
  <label>
    Image 3:
  <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/P17000212/IGNF_PVA_1-0__2017-06-17__CP17000212_17FD5820x00020_02211.tif"/>
  </label>
  <label>
    Image 4:
  <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/2524-0051/IGNF_PVA_1-0__1949-07-30__C2524-0051_1949_F2524-2724_0240.tif"/>
  </label>
  <label>
    Image 5:
  <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/2524-0041/IGNF_PVA_1-0__1957-06-28__C2524-0041_1957_F2524-2624_0074.tif"/>
  </label>
  <label>
    Image 6:
  <input class="url" type="text" value="https://data.geopf.fr/chunk/telechargement/download/pva/2621-0031/IGNF_PVA_1-0__1971-07-09__C2621-0031_1971_FR2119_0474.tif"/>
  </label>
  <label>
    Largeur des images :
    <input id="width" type="number" value="500" min="0" />
  </label>
  <label>
    Qualité :
    <input id="quality" type="range" min="0" max="1" value="0.5" step="0.1" />
  </label>
  <button onclick="getImage()">Charger</button>
  <br/>
<script>

  
  
class TIFFLoader {
  constructor(options) {
    const target = this.target = document.createElement('div');
    target.style.position = 'absolute';
    target.style.top = 0;
    target.style.left = 0;
    target.style.transform = 'translate(-150%, -150%)';
    document.body.appendChild(this.target)
    this.map = new ol.Map ({
      target: this.target,
    });
    this.layers = [];
  }
  
  load(url, width, options, callback) {
    options = options || {};
    this.layers.push({
      url: url, 
      source: null,
      width: width, 
      type: options.type || 'image/jpeg',
      quality: options.quality || 0.5,
      callback: callback
    })
    // Start loading
    setTimeout(() => this._load());
  }

  reset() {
    this.running = false;
    this.layers = [];
  }

  _load() {
    if (this.running) console.log('pending', this.layers.length)
    if (this.running) return;
    const current = this.layers.pop();
    // Finish?
    if (!current) return;
    console.time('Chargement')
    console.log('load', this.layers.length + 1)
    var timer = new Date();
    this.running = true;
    var self = this;
    var url = current.url;
    var source = current.source = new ol.source.GeoTIFF({ 
      convertToRGB: true,
      normalize: true,
      sources: [{ 
        url: url,
      }] 
    });
    var width = current.width;
    var callback = current.callback;
    var map = this.map;
    var target = this.target;
    var layer, print;
    source.on(['tileloaderror', 'error'], console.log)
    source.getView().then(view => {
      // Scale
      var size = [view.extent[2], view.extent[3]];
      var sc = Math.max(1, view.extent[2]/view.extent[3]);
      var w = parseInt(width);
      var h = Math.floor(w/sc);

      target.style.width = w+'px';
      target.style.height = h+'px';

      setTimeout(() => {
        layer = new ol.layer.WebGLTile({ 
          preload: 0,
          source: source 
        });
        map.setView(new ol.View(view))
        map.render();
        map.once('rendercomplete', function (event) {
          var canvas = map.getViewport().querySelector('.ol-layers canvas');
          var img = document.createElement('IMG')
          img.src = canvas.toDataURL(current.type, current.quality);
          callback({
            thumb: img,
            time: new Date() - timer,
            size: size
          })
          map.removeLayer(layer);
          console.timeEnd('Chargement')
          self.running = false;
          self._load();
        })
        map.addLayer(layer);
        map.render();
      })
    })
  }
}

var loader = new TIFFLoader();

function getImage() {
  document.body.dataset.loading = "";
  document.querySelectorAll('.result').forEach(i => i.remove());
  const width = document.getElementById('width').value;
  const quality = document.getElementById('quality').value;
  document.querySelectorAll('.url').forEach(input => {
    if (input.value) {
      loader.load(
        input.value,
        width,
        {
          type: 'image/jpeg',
          quality: parseFloat(quality)
        },
        img => {
          var div = document.createElement('div');
          div.className = 'result';
          document.body.appendChild(div)
          div.appendChild(img.thumb);
          var span = document.createElement('span');
          span.innerText = '⏱️' + (Math.round(img.time / 100) / 10) +' s';
          div.appendChild(span);
          delete document.body.dataset.loading;
        }
      )
    }
  })
}

</script>
</body>
</html>
